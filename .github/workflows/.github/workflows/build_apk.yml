name: 构建 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 APK
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            kivy/buildozer:latest \
            buildozer android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: CtyunQuote-APK
          path: bin/*.apk
