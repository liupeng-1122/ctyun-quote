name: 构建 Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建应用图标
        run: |
          mkdir -p icons
          python3 -c "
          import struct, zlib
          def create_png(path, w, h, r, g, b):
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      raw += bytes([r, g, b, 255])
              compressed = zlib.compress(raw)
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              png = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', ihdr)
              png += chunk(b'IDAT', compressed)
              png += chunk(b'IEND', b'')
              with open(path, 'wb') as f:
                  f.write(png)
          create_png('icons/icon.png', 192, 192, 44, 95, 138)
          print('图标已创建')
          "

      - name: 构建 APK
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -u user \
            kivy/buildozer:latest \
            bash -c "
              mkdir -p /home/user/.android
              echo '24333f8a63b6825ea9c5514f83c2829b004d1fee' > /home/user/.android/android-sdk-license
              echo '84831b9409646a918e30573bab4c9c91346d8abd' >> /home/user/.android/android-sdk-license
              echo 'd975f751698a77b662f1254ddbeed3901e976f5a' >> /home/user/.android/android-sdk-license
              buildozer android debug
            "


      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: CtyunQuote-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
